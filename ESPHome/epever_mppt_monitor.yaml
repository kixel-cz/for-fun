esphome:
  name: mppt-monitor
  friendly_name: "Epever Tracer 3210AN MPPT Monitor"
  on_boot:
    ## configure controller settings at setup
    ## make sure priority is lower than setup_priority of modbus_controller
    priority: -100
    then:
      - lambda: |-
          // get local time and sync to controller
          time_t now = ::time(nullptr);
          struct tm *time_info = ::localtime(&now);
          int seconds = time_info->tm_sec;
          int minutes = time_info->tm_min;
          int hour = time_info->tm_hour;
          int day = time_info->tm_mday;
          int month = time_info->tm_mon + 1;
          int year = time_info->tm_year % 100;
          // if there is no internet connection localtime returns year 70
          if (year != 70) {
            esphome::modbus_controller::ModbusController *controller = id(mppt_controller);
            // create the payload
            std::vector<uint16_t> rtc_data = {uint16_t((minutes << 8) | seconds), uint16_t((day << 8) | hour),
                                              uint16_t((year << 8) | month)};
            esphome::modbus_controller::ModbusCommandItem set_rtc_command =
                esphome::modbus_controller::ModbusCommandItem::create_write_multiple_command(controller, 0x9013, 3, rtc_data);
            mppt_controller->queue_command(set_rtc_command);
            ESP_LOGI("ModbusLambda", "Epever RTC set to %02d:%02d:%02d %02d.%02d.%04d", hour, minutes, seconds, day, month,
                    year + 2000);
          }

time:
  - platform: sntp
    id: sntp_time

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA

  ap:
    ssid: "Mppt-Monitor Fallback Hotspot"
    password: !secret fallback_password

captive_portal:

web_server:
  port: 80
  version: 2
  auth:
    username: !secret admin_username
    password: !secret admin_password

api:
  encryption:
    key: !secret ha_hash

ota:
  platform: esphome
  password: !secret ota_password
  id: my_ota

logger:
  baud_rate: 0

uart:
  id: uart_modbus
  tx_pin: TX
  rx_pin: RX
  baud_rate: 115200

modbus:
  id: modbus1
  uart_id: uart_modbus

modbus_controller:
  - id: mppt_controller
    address: 1
    modbus_id: modbus1
    update_interval: 30s

sensor:
  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "PV Input Voltage"
    register_type: read
    address: 0x3100
    value_type: U_WORD
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "PV Input Current"
    register_type: read
    address: 0x3101
    value_type: U_WORD
    device_class: current
    state_class: measurement
    unit_of_measurement: "A"
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "PV Power"
    register_type: read
    address: 0x3102
    value_type: U_DWORD_R
    device_class: power
    state_class: measurement
    unit_of_measurement: "W"
    accuracy_decimals: 0
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Battery Voltage"
    register_type: read
    address: 0x331A
    unit_of_measurement: "V"
    state_class: measurement
    value_type: U_WORD
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Battery Current"
    register_type: read
    address: 0x331B
    unit_of_measurement: "A"
    state_class: measurement
    value_type: S_DWORD_R
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Battery SOC"
    register_type: read
    address: 0x311A
    unit_of_measurement: "%"
    state_class: measurement
    device_class: battery
    value_type: U_WORD
    accuracy_decimals: 0

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Battery Temperature"
    register_type: read
    address: 0x3110
    unit_of_measurement: "°C"
    state_class: measurement
    value_type: U_WORD
    device_class: temperature
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Load Voltage"
    register_type: read
    address: 0x310C
    unit_of_measurement: "V"
    state_class: measurement
    value_type: U_WORD
    device_class: voltage
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Load Current"
    register_type: read
    address: 0x310D
    unit_of_measurement: "A"
    state_class: measurement
    value_type: U_WORD
    device_class: current
    accuracy_decimals: 2
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Load Power"
    register_type: read
    address: 0x310E
    unit_of_measurement: "W"
    state_class: measurement
    value_type: U_DWORD_R
    device_class: power
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Controller Temperature"
    register_type: read
    address: 0x3111
    unit_of_measurement: "°C"
    state_class: measurement
    value_type: U_WORD
    device_class: temperature
    accuracy_decimals: 1
    filters:
      - multiply: 0.01

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Total generated energy"
    register_type: read
    address: 0x3312
    unit_of_measurement: "kWh"
    value_type: U_DWORD_R
    accuracy_decimals: 3
    filters:
      - multiply: 0.01
    state_class: total_increasing
    device_class: energy

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    name: "Total consumed energy"
    register_type: read
    address: 0x330A
    unit_of_measurement: "kWh"
    value_type: U_DWORD_R
    accuracy_decimals: 3
    filters:
      - multiply: 0.01
    state_class: total_increasing
    device_class: energy

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    id: charging_status
    register_type: read
    address: 0x3201
    unit_of_measurement: ""
    value_type: U_WORD
    accuracy_decimals: 0

text_sensor:
  - platform: template
    name: "Charging Status"
    lambda: |-
      int value = int(id(charging_status).state);
      int status = (value >> 2) & 0x03;
      if (status == 0) {
        return {"Not charging"};
      } else if (status == 1) {
        return {"Float"};
      } else if (status == 2) {
        return {"Boost"};
      } else if (status == 3) {
        return {"Equalization"};
      } else {
        return {"Unknown"};
      }
    icon: "mdi:battery-charging"

switch:
  - platform: restart
    name: "Restart"
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    register_type: coil
    id: clear_energy_stats
    address: 0x14
    offset: 0
    name: "Clear generating electricity statistics"
    bitmask: 1
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: modbus_controller
    modbus_controller_id: mppt_controller
    register_type: coil
    id: charging_device
    address: 0x00
    offset: 0
    name: "Charging device"
    bitmask: 1
    restore_mode: RESTORE_DEFAULT_ON
